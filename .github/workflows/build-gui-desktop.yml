name: Build GUI Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-gui-desktop.yml"
      - "diffrenciation/power rule menthod/GUI OF POWER RULE MENTHOD/differentiation-gui/**"

permissions:
  contents: read

env:
  APP_DIR: diffrenciation/power rule menthod/GUI OF POWER RULE MENTHOD/differentiation-gui
  APP_NAME: QuickRedTechDifferentiator

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "${{ env.APP_DIR }}/requirements-build.txt"

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build Windows EXE or macOS installer
        run: python build_release.py

      - name: Show packaged files
        run: python -c "from pathlib import Path; [print(path) for path in sorted(Path('build_artifacts').glob('*'))]"

      - name: Upload Windows EXE package
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-package
          path: "${{ env.APP_DIR }}/build_artifacts/*windows-exe.zip"
          if-no-files-found: error

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-package
          path: "${{ env.APP_DIR }}/build_artifacts/*macos.dmg"
          if-no-files-found: error

      - name: Upload macOS APP archive
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-package
          path: "${{ env.APP_DIR }}/build_artifacts/*macos-app.zip"
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.*
          generate_release_notes: true
